<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <title>Nos sorties 💝</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <!-- ══ FIREBASE ══ -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getDatabase, ref, onValue, push, remove, update, enableNetwork, disableNetwork }
      from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

    const firebaseConfig = {
      apiKey:"AIzaSyAKOmYnpnx0u-luZZLkKonEH0sbFxeaAEg",
      authDomain:"date-f808c.firebaseapp.com",
      databaseURL:"https://date-f808c-b7373-default-rtdb.firebaseio.com",
      projectId:"date-f808c",
      storageBucket:"date-f808c.firebasestorage.app",
      messagingSenderId:"430296013554",
      appId:"1:430296013554:web:e4249cab779b3881fe0e6b"
    };

    let app, db;
    try { app = initializeApp(firebaseConfig); db = getDatabase(app); }
    catch(e) { console.error('Firebase init error:', e); }

    if (db) {
      window._fb = {
        ideasRef:()=>ref(db,'ideas'), memoriesRef:()=>ref(db,'memories'),
        ideaRef:(k)=>ref(db,`ideas/${k}`), memoryRef:(k)=>ref(db,`memories/${k}`),
        presenceRef:()=>ref(db,'presence'),
        push, remove, update, onValue, ref, db
      };

      // ── Seed data ──
      onValue(ref(db,'ideas'), snap => {
        if (!snap.exists()) {
          [
            { name:'Pique-nique au parc',     cat:'Balade',   budget:'gratuit', note:'Parc des Buttes-Chaumont, Paris', done:false, weather:'outdoor', addedBy:'Moi' },
            { name:'Restaurant japonais',      cat:'Restau',   budget:'€€',      note:'15 rue Sainte-Anne, Paris',       done:false, weather:'indoor',  addedBy:'Moi' },
            { name:'Musée en amoureux',        cat:'Culture',  budget:'€',       note:'Musée d\'Orsay, Paris',           done:false, weather:'indoor',  addedBy:'Moi' },
            { name:'Film + plaid + pop-corn',  cat:'Cocooning',budget:'gratuit', note:'',                                done:false, weather:'indoor',  addedBy:'Moi' },
            { name:'Randonnée en forêt',       cat:'Balade',   budget:'gratuit', note:'Forêt de Rambouillet',            done:false, weather:'outdoor', addedBy:'Moi' },
            { name:'Cours de cuisine ensemble',cat:'Gourmand', budget:'€€',      note:'',                                done:false, weather:'indoor',  addedBy:'Moi' },
          ].forEach(d => push(ref(db,'ideas'), d));
        }
      }, { onlyOnce:true });

      onValue(ref(db,'memories'), snap => {
        if (!snap.exists()) {
          [
            { name:'Week-end à la mer',  cat:'Voyage',   date:'2025-07-14', rating:5, note:"Les pieds dans l'eau 🌅", photoUrl:'' },
            { name:'Marché de Noël',     cat:'Gourmand', date:'2025-12-20', rating:4, note:'Vin chaud et lumières !', photoUrl:'' },
          ].forEach(d => push(ref(db,'memories'), d));
        }
      }, { onlyOnce:true });

      // ── Live ideas ──
      onValue(ref(db,'ideas'), snap => {
        const raw = snap.val() || {};
        window._ideas = Object.entries(raw).map(([fbKey,v]) => ({ fbKey, ...v }));
        // Cache offline
        try { localStorage.setItem('_ideas_cache', JSON.stringify(window._ideas)); } catch(_){}
        window.renderList       && window.renderList();
        window.buildListFilters && window.buildListFilters();
        window.buildWheelFilters&& window.buildWheelFilters();
        window.drawWheel        && window.drawWheel();
        const el = document.getElementById('badge-count');
        if (el) el.textContent = window._ideas.filter(i=>!i.done).length;
      });

      // ── Live memories ──
      onValue(ref(db,'memories'), snap => {
        const raw = snap.val() || {};
        window._memories = Object.entries(raw).map(([fbKey,v]) => ({ fbKey, ...v }));
        try { localStorage.setItem('_memories_cache', JSON.stringify(window._memories)); } catch(_){}
        window.renderMemories && window.renderMemories();
        window.renderStats    && window.renderStats();
        window.buildMemFilters&& window.buildMemFilters();
        const el = document.getElementById('badge-mem');
        if (el) el.textContent = window._memories.length;
      });

      // ── Connectivity ──
      onValue(ref(db,'.info/connected'), snap => {
        const dot = document.getElementById('sync-dot');
        const lbl = document.getElementById('sync-label');
        const offline = document.getElementById('offline-banner');
        if (snap.val()) {
          if (dot) dot.className='sync-dot ok';
          if (lbl) lbl.textContent='';
          if (offline) offline.style.display='none';
        } else {
          if (dot) dot.className='sync-dot err';
          if (lbl) lbl.textContent='hors ligne';
          if (offline) offline.style.display='flex';
          // Load cache
          try {
            const ic = localStorage.getItem('_ideas_cache');
            const mc = localStorage.getItem('_memories_cache');
            if (ic && !window._ideas.length) window._ideas = JSON.parse(ic);
            if (mc && !window._memories.length) window._memories = JSON.parse(mc);
            window.renderList    && window.renderList();
            window.renderMemories&& window.renderMemories();
          } catch(_){}
        }
      });
    }
  </script>

  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --rose:#C94B7A; --rose-light:#FDF0F5; --rose-mid:#E88BB0;
      --rose-pale:#FAE0EA; --rose-dark:#7A1F3E;
      --cream:#FDF8F4; --ink:#1E1B18; --ink-soft:#7A756E; --ink-muted:#C2BDB6;
      --border:rgba(30,27,24,0.08); --border-rose:rgba(201,75,122,0.2);
      --green:#1A8F6A; --green-light:#E5F4EE;
      --blue:#1A60B0; --blue-light:#E5EEFA;
      --amber:#A86A00; --amber-light:#FFF0D6;
      --card-shadow:0 2px 20px rgba(201,75,122,0.07);
      --nav-h:68px; --safe-bottom:env(safe-area-inset-bottom,16px);
    }
    html { scroll-behavior:smooth; -webkit-text-size-adjust:100%; }
    body {
      font-family:'Plus Jakarta Sans',sans-serif;
      background:var(--cream); color:var(--ink);
      min-height:100dvh; overflow-x:hidden;
      padding-bottom:calc(var(--nav-h) + var(--safe-bottom));
      -webkit-tap-highlight-color:transparent;
    }

    /* ── HEART CANVAS ── */
    #heart-canvas { position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999; }

    /* ── COUPLE LOCK SCREEN ── */
    #couple-screen {
      position:fixed;inset:0;background:var(--cream);z-index:8888;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      padding:2rem;gap:1.5rem;
    }
    #couple-screen h2 { font-family:'Playfair Display',serif;font-size:28px;text-align:center; }
    #couple-screen h2 em { font-style:italic;color:var(--rose); }
    #couple-screen p { font-size:13px;color:var(--ink-soft);text-align:center;line-height:1.6;max-width:300px; }
    #couple-code-input {
      width:100%;font-family:'Plus Jakarta Sans',sans-serif;font-size:22px;font-weight:600;
      text-align:center;letter-spacing:.3em;text-transform:uppercase;
      background:white;border:2px solid var(--border);border-radius:16px;
      padding:16px;outline:none;color:var(--rose-dark);
      transition:border-color .2s;
    }
    #couple-code-input:focus { border-color:var(--rose); }
    .couple-btn {
      width:100%;font-family:'Playfair Display',serif;font-style:italic;font-size:18px;
      background:linear-gradient(135deg,var(--rose),var(--rose-dark));
      color:white;border:none;border-radius:50px;padding:15px;
      cursor:pointer;box-shadow:0 4px 20px rgba(201,75,122,.35);
      transition:opacity .15s;
    }
    .couple-btn:active { opacity:.85; }
    .couple-code-display {
      font-size:11px;color:var(--ink-muted);text-align:center;
    }

    /* ── OFFLINE BANNER ── */
    #offline-banner {
      display:none;background:#FFF0D6;border-bottom:1px solid rgba(168,106,0,.2);
      padding:8px 1.25rem;font-size:12px;color:#5E3900;
      align-items:center;gap:8px;
    }

    /* ── HEADER ── */
    header {
      background:rgba(253,248,244,0.94);backdrop-filter:blur(20px);
      -webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);
      padding:.9rem 1.25rem .8rem;position:sticky;top:0;z-index:100;
    }
    .header-row { display:flex;align-items:center;gap:8px; }
    h1 { font-family:'Playfair Display',serif;font-weight:400;font-size:22px;line-height:1;flex:1; }
    h1 em { font-style:italic;color:var(--rose); }
    .header-meta { display:flex;flex-direction:column;align-items:flex-end;gap:2px; }
    .sync-dot { width:7px;height:7px;border-radius:50%;background:#ccc;display:inline-block;transition:background .4s; }
    .sync-dot.ok  { background:var(--green); }
    .sync-dot.err { background:#E24B4A; }
    #sync-label { font-size:10px;color:var(--ink-muted); }
    #last-added { font-size:10px;color:var(--ink-soft);font-style:italic; }

    /* ── WEATHER STRIP ── */
    .weather-strip {
      display:flex;gap:6px;padding:.6rem 1rem;
      background:white;border-bottom:1px solid var(--border);
      overflow-x:auto;scrollbar-width:none;
    }
    .weather-strip::-webkit-scrollbar { display:none; }
    .weather-pill {
      flex-shrink:0;font-size:12px;font-weight:600;padding:5px 12px;
      border-radius:20px;border:1.5px solid var(--border);background:var(--cream);
      color:var(--ink-soft);cursor:pointer;transition:all .2s;
      display:flex;align-items:center;gap:5px;
    }
    .weather-pill.active { background:var(--rose);color:white;border-color:var(--rose); }
    .weather-pill.outdoor.active { background:#1A8F6A;border-color:#1A8F6A; }
    .weather-pill.indoor.active  { background:#1A60B0;border-color:#1A60B0; }

    /* ── NAV ── */
    nav {
      position:fixed;bottom:0;left:0;right:0;z-index:200;
      background:rgba(253,248,244,0.97);backdrop-filter:blur(24px);
      -webkit-backdrop-filter:blur(24px);border-top:1px solid var(--border);
      display:flex;align-items:stretch;
      height:calc(var(--nav-h) + var(--safe-bottom));
      padding-bottom:var(--safe-bottom);
    }
    .nav-btn {
      flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
      font-size:9px;font-weight:600;letter-spacing:.03em;
      color:var(--ink-muted);background:none;border:none;cursor:pointer;padding:6px 2px;
      transition:color .2s;position:relative;-webkit-tap-highlight-color:transparent;
    }
    .nav-btn svg { width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.8;transition:transform .2s; }
    .nav-btn.active { color:var(--rose); }
    .nav-btn.active svg { transform:scale(1.12); }
    .nav-btn:active svg { transform:scale(0.88); }
    .nav-badge {
      position:absolute;top:5px;right:calc(50% - 16px);
      min-width:15px;height:15px;border-radius:20px;
      background:var(--rose);color:white;font-size:8px;font-weight:700;
      padding:0 4px;display:flex;align-items:center;justify-content:center;
    }

    /* ── MAIN ── */
    main { max-width:440px;margin:0 auto;padding:1.1rem 1rem 1rem; }
    .panel { display:none; }
    .panel.active { display:block; }
    .section-head { margin-bottom:1rem; }
    .section-title { font-family:'Playfair Display',serif;font-weight:400;font-size:21px; }
    .section-title em { font-style:italic;color:var(--rose); }
    .section-sub { font-size:11px;color:var(--ink-soft);margin-top:2px; }

    /* ── FILTER ROW ── */
    .filter-row {
      display:flex;gap:6px;flex-wrap:nowrap;overflow-x:auto;
      -webkit-overflow-scrolling:touch;scrollbar-width:none;
      margin-bottom:.9rem;padding-bottom:2px;
    }
    .filter-row::-webkit-scrollbar { display:none; }
    .pill {
      flex-shrink:0;font-size:12px;font-weight:500;padding:5px 13px;
      border-radius:20px;border:1.5px solid var(--border);
      background:white;color:var(--ink-soft);cursor:pointer;transition:all .2s;white-space:nowrap;
    }
    .pill.active { background:var(--rose);color:white;border-color:var(--rose); }

    /* ── IDEA CARDS ── */
    .ideas-list { display:flex;flex-direction:column;gap:9px; }
    .idea-card {
      background:white;border:1px solid var(--border);border-radius:16px;
      box-shadow:var(--card-shadow);overflow:hidden;
      animation:slideUp .3s ease both;transition:transform .15s;
    }
    .idea-card:active { transform:scale(0.98); }
    @keyframes slideUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .idea-main { display:flex;align-items:center;gap:11px;padding:13px 14px; }
    .cat-dot { width:11px;height:11px;border-radius:50%;flex-shrink:0; }
    .idea-body { flex:1;min-width:0; }
    .idea-name { font-size:14px;font-weight:600;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }
    .idea-meta { font-size:11px;color:var(--ink-soft);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:flex;align-items:center;gap:4px; }
    .weather-icon { font-size:12px; }
    .idea-actions { display:flex;align-items:center;gap:4px;flex-shrink:0; }
    .budget-tag { font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;flex-shrink:0; }
    .done-badge { font-size:10px;padding:2px 7px;border-radius:20px;background:var(--green-light);color:var(--green);font-weight:600; }
    .added-by-chip { font-size:9px;padding:2px 7px;border-radius:20px;background:var(--rose-light);color:var(--rose-dark);font-weight:600;white-space:nowrap; }

    /* ── IDEA TOOLBAR (expandable) ── */
    .idea-toolbar {
      display:flex;gap:0;border-top:1px solid var(--border);
    }
    .toolbar-btn {
      flex:1;display:flex;align-items:center;justify-content:center;gap:5px;
      padding:9px 4px;font-size:11px;font-weight:600;color:var(--ink-soft);
      background:none;border:none;cursor:pointer;transition:all .15s;
      -webkit-tap-highlight-color:transparent;
    }
    .toolbar-btn svg { width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2; }
    .toolbar-btn:not(:last-child) { border-right:1px solid var(--border); }
    .toolbar-btn:active { background:var(--cream); }
    .toolbar-btn.maps:active  { color:var(--blue);background:var(--blue-light); }
    .toolbar-btn.share:active { color:var(--rose);background:var(--rose-light); }
    .toolbar-btn.check-btn:active { color:var(--green);background:var(--green-light); }
    .toolbar-btn.del:active   { color:#E24B4A;background:#FCEBEB; }

    .btn-icon {
      background:none;border:none;cursor:pointer;color:var(--ink-muted);
      border-radius:10px;padding:7px;display:flex;align-items:center;
      transition:all .2s;-webkit-tap-highlight-color:transparent;
    }
    .btn-icon svg { width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:1.8; }
    .btn-icon:active { transform:scale(0.85); }
    .btn-icon.danger:active { color:#E24B4A;background:#FCEBEB; }

    /* ── EMPTY ── */
    .empty { text-align:center;padding:3rem 1rem;color:var(--ink-soft); }
    .empty-icon { font-size:40px;margin-bottom:.75rem; }
    .empty p { font-size:14px;line-height:1.7; }

    /* ── FORM ── */
    .form-card {
      background:white;border:1px solid var(--border);
      border-radius:20px;padding:1.2rem;box-shadow:var(--card-shadow);
    }
    .form-grid { display:flex;flex-direction:column;gap:15px; }
    label { display:block;font-size:11px;font-weight:600;color:var(--ink-soft);margin-bottom:5px;letter-spacing:.06em;text-transform:uppercase; }
    input[type="text"],input[type="date"],input[type="url"],select,textarea {
      width:100%;font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;color:var(--ink);
      background:var(--cream);border:1.5px solid var(--border);border-radius:12px;
      padding:11px 13px;outline:none;transition:border-color .2s,background .2s;
      -webkit-appearance:none;appearance:none;
    }
    input:focus,select:focus,textarea:focus { border-color:var(--rose);background:white; }
    textarea { resize:none;min-height:80px;line-height:1.6; }
    .two-col { display:grid;grid-template-columns:1fr 1fr;gap:10px; }
    .three-col { display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px; }

    .rating-group { display:flex;gap:6px;flex-wrap:wrap; }
    .rating-btn {
      flex:1;min-width:0;background:var(--cream);border:1.5px solid var(--border);
      border-radius:10px;padding:9px 4px;font-size:11px;cursor:pointer;
      transition:all .2s;color:var(--ink-soft);text-align:center;white-space:nowrap;
    }
    .rating-btn.active { background:var(--rose-pale);border-color:var(--rose-mid);color:var(--rose-dark); }

    .weather-select { display:grid;grid-template-columns:1fr 1fr;gap:8px; }
    .weather-opt {
      border:1.5px solid var(--border);border-radius:12px;padding:10px;
      display:flex;align-items:center;gap:8px;cursor:pointer;
      background:var(--cream);transition:all .2s;font-size:13px;font-weight:500;color:var(--ink-soft);
    }
    .weather-opt span.icon { font-size:18px; }
    .weather-opt.active.outdoor { border-color:#1A8F6A;background:var(--green-light);color:#0F5038; }
    .weather-opt.active.indoor  { border-color:#1A60B0;background:var(--blue-light);color:#0F3A70; }

    .btn-submit {
      font-family:'Playfair Display',serif;font-style:italic;font-size:17px;font-weight:400;
      background:linear-gradient(135deg,var(--rose),var(--rose-dark));
      color:white;border:none;border-radius:50px;padding:14px 28px;
      cursor:pointer;transition:transform .15s,opacity .15s;
      display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
      box-shadow:0 4px 20px rgba(201,75,122,0.35);
    }
    .btn-submit:active { transform:scale(0.97);opacity:.9; }
    .btn-submit svg { width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2; }
    .btn-submit:disabled { opacity:.5; }

    /* ── WHEEL ── */
    .wheel-wrap { position:relative;width:100%;max-width:290px;margin:0 auto 1.1rem;aspect-ratio:1; }
    canvas#wheel { width:100%;height:100%;display:block; }
    .wheel-pointer {
      position:absolute;top:-8px;left:50%;transform:translateX(-50%);
      width:0;height:0;border-left:10px solid transparent;border-right:10px solid transparent;
      border-top:26px solid var(--rose-dark);filter:drop-shadow(0 2px 4px rgba(0,0,0,.2));
    }
    .wheel-center {
      position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
      width:48px;height:48px;border-radius:50%;background:white;
      display:flex;align-items:center;justify-content:center;
      font-size:22px;box-shadow:0 2px 12px rgba(0,0,0,.15);cursor:pointer;
    }
    .btn-spin {
      font-family:'Playfair Display',serif;font-style:italic;font-weight:400;font-size:19px;
      background:linear-gradient(135deg,var(--rose),var(--rose-dark));
      color:white;border:none;border-radius:50px;padding:14px 24px;cursor:pointer;width:100%;
      box-shadow:0 4px 20px rgba(201,75,122,.35);
      transition:transform .15s,opacity .15s;margin-bottom:.9rem;
    }
    .btn-spin:active { transform:scale(0.97);opacity:.9; }
    .btn-spin:disabled { opacity:.45; }
    .result-box {
      background:white;border:1px solid var(--border-rose);border-radius:18px;
      padding:1.2rem;text-align:center;box-shadow:var(--card-shadow);
      animation:pop .3s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes pop { from{opacity:0;transform:scale(.85)} to{opacity:1;transform:scale(1)} }
    .result-label { font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--rose);margin-bottom:7px; }
    .result-name  { font-family:'Playfair Display',serif;font-size:21px;color:var(--rose-dark);line-height:1.2;margin-bottom:5px; }
    .result-detail { font-size:12px;color:var(--ink-soft); }
    .result-actions { display:flex;gap:8px;margin-top:12px; }
    .btn-done {
      flex:1;font-size:13px;font-weight:600;
      background:var(--rose);color:white;border:none;
      border-radius:20px;padding:9px;cursor:pointer;transition:opacity .15s;
    }
    .btn-done:active { opacity:.8; }
    .btn-result-share {
      background:none;border:1.5px solid var(--border-rose);border-radius:20px;padding:9px 14px;
      color:var(--rose-dark);font-size:13px;font-weight:600;cursor:pointer;
      display:flex;align-items:center;gap:5px;
    }
    .btn-result-share svg { width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2; }

    /* ── MEMORIES ── */
    .stats-grid { display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1.1rem; }
    .stat-card { background:white;border:1px solid var(--border);border-radius:14px;padding:.85rem;text-align:center;box-shadow:var(--card-shadow); }
    .stat-num { font-family:'Playfair Display',serif;font-size:24px;color:var(--rose);line-height:1;margin-bottom:3px; }
    .stat-label { font-size:10px;color:var(--ink-soft);font-weight:500; }

    .mem-toolbar { display:flex;gap:8px;justify-content:space-between;align-items:center;margin-bottom:.8rem; }
    .sort-btn {
      font-size:11px;font-weight:600;padding:6px 12px;border-radius:20px;
      border:1.5px solid var(--border-rose);background:var(--rose-light);color:var(--rose-dark);
      cursor:pointer;display:flex;align-items:center;gap:5px;transition:background .2s;
    }
    .sort-btn svg { width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2.5; }
    .export-btn {
      font-size:11px;font-weight:600;padding:6px 12px;border-radius:20px;
      border:1.5px solid var(--border);background:white;color:var(--ink-soft);
      cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s;
    }
    .export-btn svg { width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2.5; }
    .export-btn:active { background:var(--cream); }

    /* ── TIMELINE ── */
    .timeline { position:relative; }
    .timeline::before {
      content:'';position:absolute;left:13px;top:8px;bottom:8px;width:1.5px;
      background:linear-gradient(to bottom,var(--rose-mid) 0%,transparent 100%);
    }
    .timeline-year {
      position:relative;padding-left:38px;margin:1.2rem 0 .5rem;
      font-family:'Playfair Display',serif;font-size:13px;font-style:italic;
      color:var(--rose);letter-spacing:.05em;
    }
    .timeline-year::before {
      content:'';position:absolute;left:6px;top:50%;transform:translateY(-50%);
      width:14px;height:14px;border-radius:50%;
      background:var(--rose);border:3px solid var(--cream);
      box-shadow:0 0 0 2px var(--rose-mid);
    }
    .timeline-item { position:relative;padding-left:38px;margin-bottom:9px; }
    .timeline-item::before {
      content:'';position:absolute;left:8px;top:17px;
      width:10px;height:10px;border-radius:50%;
      background:white;border:2px solid var(--rose-mid);
    }
    .memory-card { background:white;border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:var(--card-shadow); }
    .memory-photo { width:100%;height:120px;object-fit:cover;display:block; }
    .memory-body { padding:12px 13px; }
    .memory-name { font-size:14px;font-weight:600;margin-bottom:2px; }
    .memory-date { font-size:11px;color:var(--ink-soft);margin-bottom:7px; }
    .memory-tags { display:flex;gap:5px;flex-wrap:wrap;margin-bottom:7px;align-items:center; }
    .tag { font-size:10px;padding:2px 7px;border-radius:20px;background:var(--cream);border:1px solid var(--border);color:var(--ink-soft); }
    .stars { color:var(--rose);font-size:12px; }
    .memory-note { font-size:12px;color:var(--ink-soft);line-height:1.6;font-style:italic;border-left:2px solid var(--rose-mid);padding-left:9px; }
    .memory-head { display:flex;justify-content:space-between;align-items:flex-start;gap:8px; }

    /* ── ACTIONS ROW in memoir ── */
    .mem-actions-row { display:flex;gap:7px;margin-bottom:1rem;flex-wrap:wrap; }
    .action-btn {
      font-size:12px;font-weight:600;padding:8px 14px;border-radius:20px;
      border:1.5px solid var(--border);background:white;color:var(--ink-soft);
      cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s;
    }
    .action-btn svg { width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2; }
    .action-btn.danger { border-color:rgba(226,75,74,.3);color:#993C1D; }
    .action-btn:active { transform:scale(0.97); }

    /* ── TOAST ── */
    #toast {
      position:fixed;bottom:calc(var(--nav-h) + var(--safe-bottom) + 10px);left:50%;
      transform:translateX(-50%) translateY(10px);
      background:var(--ink);color:white;font-size:13px;font-weight:500;
      padding:10px 20px;border-radius:50px;z-index:9998;
      transition:transform .35s cubic-bezier(.34,1.56,.64,1),opacity .35s;
      opacity:0;pointer-events:none;white-space:nowrap;
      box-shadow:0 4px 20px rgba(0,0,0,.2);
    }
    #toast.show { transform:translateX(-50%) translateY(0);opacity:1; }

    @media (prefers-color-scheme:dark) {
      :root { --cream:#1A1614;--ink:#F5F0EB;--ink-soft:#9E9890;--ink-muted:#5C5852;--border:rgba(245,240,235,0.1);--card-shadow:0 2px 20px rgba(0,0,0,.3); }
      header,nav { background:rgba(26,22,20,.95); }

  </style>
</head>

<script>
/* ══════════════════════════════════════════
   HEART CANVAS
══════════════════════════════════════════ */
const hCanvas = document.getElementById('heart-canvas');
const hCtx = hCanvas.getContext('2d');
let hearts = [];
function resizeHCanvas(){hCanvas.width=window.innerWidth;hCanvas.height=window.innerHeight;}
resizeHCanvas();
window.addEventListener('resize',resizeHCanvas);
function heartPath(ctx,x,y,size){
  ctx.save();ctx.translate(x,y);ctx.scale(size/30,size/30);
  ctx.beginPath();ctx.moveTo(0,-10);
  ctx.bezierCurveTo(5,-20,20,-15,20,0);ctx.bezierCurveTo(20,12,8,22,0,30);
  ctx.bezierCurveTo(-8,22,-20,12,-20,0);ctx.bezierCurveTo(-20,-15,-5,-20,0,-10);
  ctx.closePath();ctx.restore();
}
function spawnHearts(x,y,count=8){
  const COLORS=['#C94B7A','#E88BB0','#F0C0D0','#D4537E','#FF8FAB','#FFB3C6'];
  for(let i=0;i<count;i++){
    hearts.push({x,y,vx:(Math.random()-.5)*6,vy:-3-Math.random()*5,
      size:10+Math.random()*22,rot:(Math.random()-.5)*.7,rotSpeed:(Math.random()-.5)*.13,
      color:COLORS[Math.floor(Math.random()*COLORS.length)],life:1,
      delay:i*35,born:Date.now()});
  }
}
function animateHearts(){
  hCtx.clearRect(0,0,hCanvas.width,hCanvas.height);
  const now=Date.now();
  hearts=hearts.filter(h=>h.life>0.01);
  hearts.forEach(h=>{
    if(now-h.born<h.delay)return;
    h.x+=h.vx;h.y+=h.vy;h.vy+=0.13;h.rot+=h.rotSpeed;h.life-=0.017;
    hCtx.save();hCtx.globalAlpha=h.life;hCtx.translate(h.x,h.y);hCtx.rotate(h.rot);
    heartPath(hCtx,0,0,h.size);hCtx.fillStyle=h.color;hCtx.fill();hCtx.restore();
  });
  requestAnimationFrame(animateHearts);
}
animateHearts();

/* ══════════════════════════════════════════
   HAPTIC
══════════════════════════════════════════ */
function haptic(type='light'){
  if(!navigator.vibrate)return;
  ({light:[15],medium:[30],heavy:[50,30,50],success:[20,20,60]})[type]
    && navigator.vibrate(({light:[15],medium:[30],heavy:[50,30,50],success:[20,20,60]})[type]);
}

/* ══════════════════════════════════════════
   COUPLE CODE
══════════════════════════════════════════ */
const SAVED_CODE_KEY = '_couple_code';
function unlockCouple(){
  const val = document.getElementById('couple-code-input').value.trim().toUpperCase();
  if(val.length<2){toast('Entrez au moins 2 caractères 💝');return;}
  haptic('success');
  try { localStorage.setItem(SAVED_CODE_KEY, val); } catch(_){}
  spawnHearts(window.innerWidth/2, window.innerHeight/2, 18);
  setTimeout(()=>{
    document.getElementById('couple-screen').style.display='none';
    window._coupleCode = val;
    window._myName = val+'_'+(['Toi','L\'autre','Le/La chéri(e)'][Math.floor(Math.random()*3)]);
    updateLastAdded();
    toast('Bienvenue dans votre bulle 💝');
  },400);
}
function initCouple(){
  try {
    const saved = localStorage.getItem(SAVED_CODE_KEY);
    if(saved){
      window._coupleCode=saved;
      document.getElementById('couple-code-input').value=saved;
      document.getElementById('couple-code-hint').textContent='Code actuel: '+saved+' · Cliquez pour changer';
      // Auto-unlock after brief moment
      document.getElementById('couple-screen').style.display='none';
      window._coupleCode=saved;
    }
  } catch(_){}
}
function updateLastAdded(){
  const el=document.getElementById('last-added');
  if(!el||!window._ideas.length)return;
  // Show who added last idea
  const last=[...window._ideas].sort((a,b)=>(b.addedAt||0)-(a.addedAt||0))[0];
  if(last&&last.addedBy) el.textContent='Dernière idée: '+last.addedBy;
}

/* ══════════════════════════════════════════
   STATE
══════════════════════════════════════════ */
window._ideas    = [];
window._memories = [];
let memSortOrder = 'asc';
let memRating    = 3;
let memFilter    = 'all';
let listFilter   = 'all';
let weatherFilter= 'all';
let wheelFilter  = 'all';
let wheelRot=0, spinning=false;
let ideaWeather  = 'outdoor'; // default weather for new idea

const CAT_COLORS = {
  Restau:'#C94B7A','Ciné':'#2F7FCC',Balade:'#1A8F6A',Culture:'#7B69D4',
  Sport:'#CC7800',Cocooning:'#D4774F',Voyage:'#1560B4',Gourmand:'#D43535',Autre:'#7A756E'
};
const BUDGET_STYLE = {
  gratuit:{bg:'#E5F4EE',color:'#0F6348'},'€':{bg:'#E5F4EE',color:'#0F6348'},
  '€€':{bg:'#FFF0D6',color:'#7A4D00'},'€€€':{bg:'#FAECE7',color:'#7A2C00'}
};

/* ══════════════════════════════════════════
   TABS
══════════════════════════════════════════ */
function goTab(name){
  haptic('light');
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
  window.scrollTo(0,0);
  if(name==='wheel'){buildWheelFilters();drawWheel();}
  if(name==='memoir'){buildMemFilters();renderMemories();renderStats();}
  if(name==='add-mem'){setTodayDate();}
}

/* ══════════════════════════════════════════
   WEATHER FILTER
══════════════════════════════════════════ */
function filterWeather(el,w){
  haptic('light');
  weatherFilter=w;
  document.querySelectorAll('#weather-strip .weather-pill').forEach(b=>b.classList.toggle('active',b.dataset.w===w));
  renderList();
}
function setWeather(w){
  haptic('light');
  ideaWeather=w;
  document.getElementById('w-outdoor').classList.toggle('active',w==='outdoor');
  document.getElementById('w-indoor').classList.toggle('active',w==='indoor');
}

/* ══════════════════════════════════════════
   IDEAS
══════════════════════════════════════════ */
window.buildListFilters=function(){
  const cats=[...new Set(window._ideas.map(i=>i.cat))].sort();
  const row=document.getElementById('list-filters');if(!row)return;
  row.innerHTML=`<button class="pill ${listFilter==='all'?'active':''}" data-cat="all" onclick="filterList(this,'all')">Tout</button>`;
  cats.forEach(c=>{
    const b=document.createElement('button');
    b.className='pill'+(listFilter===c?' active':'');
    b.textContent=c;b.dataset.cat=c;b.onclick=function(){filterList(this,c);};
    row.appendChild(b);
  });
  const bc=document.getElementById('badge-count');
  if(bc)bc.textContent=window._ideas.filter(i=>!i.done).length;
};

function filterList(el,cat){
  haptic('light');listFilter=cat;
  document.querySelectorAll('#list-filters .pill').forEach(b=>b.classList.toggle('active',b.dataset.cat===cat));
  renderList();
}

/* Smart address detection */
function looksLikeAddress(note){
  if(!note)return false;
  const lower=note.toLowerCase();
  return /\d+\s+\w/.test(note)||/rue|avenue|place|boulevard|chemin|route|allée|impasse/i.test(note)||/\d{5}/.test(note);
}
function buildMapsUrl(note){
  return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(note);
}

window.renderList=function(){
  const all=window._ideas;
  let filtered=(listFilter==='all'?all:all.filter(i=>i.cat===listFilter));
  if(weatherFilter!=='all') filtered=filtered.filter(i=>i.weather===weatherFilter||(i.weather===undefined&&weatherFilter==='outdoor'));
  const sorted=[...filtered].sort((a,b)=>a.name.localeCompare(b.name,'fr'));
  const el=document.getElementById('ideas-list');if(!el)return;
  const bc=document.getElementById('badge-count');if(bc)bc.textContent=all.filter(i=>!i.done).length;
  if(!all.length){el.innerHTML=`<div class="empty"><div class="empty-icon">💝</div><p>Ajoutez votre première idée !</p></div>`;return;}
  if(!sorted.length){el.innerHTML=`<div class="empty"><div class="empty-icon">🔍</div><p>Aucune idée pour ce filtre.</p></div>`;return;}

  el.innerHTML=sorted.map((idea,idx)=>{
    const bs=BUDGET_STYLE[idea.budget]||BUDGET_STYLE['€€'];
    const hasAddr=looksLikeAddress(idea.note)||/https?:\/\/maps/i.test(idea.note||'');
    const wIcon=idea.weather==='indoor'?'🌧️':idea.weather==='outdoor'?'☀️':'';
    const mapsBtn=hasAddr?`<button class="toolbar-btn maps" onclick="openMaps('${(idea.note||'').replace(/'/g,"\\'")}')">
        <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>Y aller 🚗</button>`:'';
    return `<div class="idea-card" style="animation-delay:${idx*35}ms">
      <div class="idea-main">
        <div class="cat-dot" style="background:${CAT_COLORS[idea.cat]||'#888'}"></div>
        <div class="idea-body">
          <div class="idea-name" style="${idea.done?'text-decoration:line-through;opacity:.4':''}">${esc(idea.name)}</div>
          <div class="idea-meta">
            ${wIcon?`<span class="weather-icon">${wIcon}</span>`:''}
            ${idea.cat}${idea.note?' · '+esc(idea.note.slice(0,40)):''}
            ${idea.addedBy?`<span class="added-by-chip">${esc(idea.addedBy)}</span>`:''}
          </div>
        </div>
        <div class="idea-actions">
          <span class="budget-tag" style="background:${bs.bg};color:${bs.color}">${idea.budget}</span>
          ${idea.done?'<span class="done-badge">✓</span>':''}
        </div>
      </div>
      <div class="idea-toolbar">
        ${mapsBtn}
        <button class="toolbar-btn share" onclick="shareIdea('${esc(idea.name).replace(/'/g,"\\'")}','${(idea.note||'').replace(/'/g,"\\'")}')">
          <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
          Partager
        </button>
        <button class="toolbar-btn check-btn" onclick="toggleDone(event,'${idea.fbKey}',${!!idea.done})">
          <svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>
          ${idea.done?'Refaire':'Fait ✓'}
        </button>
        <button class="toolbar-btn del" onclick="deleteIdea(event,'${idea.fbKey}')">
          <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          Sup.
        </button>
      </div>
    </div>`;
  }).join('');
};

function openMaps(addr){
  haptic('medium');
  window.open(buildMapsUrl(addr),'_blank');
}

function shareIdea(name,note){
  haptic('light');
  const text=`Hé, j'ai trouvé notre prochaine sortie : *${name}* !`+(note?`\n📍 ${note}`:'')+`\nOn se fait ça quand ? 💝`;
  if(navigator.share){
    navigator.share({title:'Notre prochaine sortie 💝',text}).catch(()=>{});
  } else {
    navigator.clipboard&&navigator.clipboard.writeText(text);
    toast('Lien copié dans le presse-papiers !');
  }
}

async function addIdea(){
  const name=document.getElementById('a-name').value.trim();
  if(!name){document.getElementById('a-name').focus();toast('Donne un nom à l\'activité 😊');return;}
  if(!window._fb){toast('Firebase non configuré ⚠️');return;}
  const btn=document.getElementById('btn-add-idea');btn.disabled=true;
  const addedBy=window._coupleCode||'Moi';
  try{
    await window._fb.push(window._fb.ideasRef(),{
      name,done:false,
      cat:document.getElementById('a-cat').value,
      budget:document.getElementById('a-budget').value,
      note:document.getElementById('a-note').value.trim(),
      weather:ideaWeather,
      addedBy,
      addedAt:Date.now()
    });
    document.getElementById('a-name').value='';
    document.getElementById('a-note').value='';
    haptic('success');
    spawnHearts(window.innerWidth/2,window.innerHeight*.4,12);
    setTimeout(()=>{goTab('list');toast('Idée ajoutée ! 💝');},200);
  }catch(e){toast('Erreur : '+e.message);}
  btn.disabled=false;
}

async function deleteIdea(e,fbKey){
  haptic('medium');
  if(!window._fb)return;
  await window._fb.remove(window._fb.ideaRef(fbKey));
  toast('Idée supprimée');
}

async function toggleDone(e,fbKey,current){
  haptic('medium');
  const rect=e.currentTarget.getBoundingClientRect();
  if(!current)spawnHearts(rect.left+rect.width/2,rect.top+rect.height/2,10);
  if(!window._fb)return;
  await window._fb.update(window._fb.ideaRef(fbKey),{done:!current});
}

async function clearDoneIdeas(){
  haptic('heavy');
  const done=window._ideas.filter(i=>i.done);
  if(!done.length){toast('Aucune idée "fait" à supprimer');return;}
  if(!confirm(`Supprimer ${done.length} idée(s) déjà faite(s) ?`))return;
  if(!window._fb)return;
  await Promise.all(done.map(i=>window._fb.remove(window._fb.ideaRef(i.fbKey))));
  toast(`${done.length} idée(s) supprimée(s) 🧹`);
}

window.buildWheelFilters=function(){
  const cats=[...new Set(window._ideas.filter(i=>!i.done).map(i=>i.cat))].sort();
  const row=document.getElementById('wheel-filters');if(!row)return;
  row.innerHTML=`<button class="pill ${wheelFilter==='all'?'active':''}" data-cat="all" onclick="filterWheel(this,'all')">Tout</button>`;
  cats.forEach(c=>{
    const b=document.createElement('button');
    b.className='pill'+(wheelFilter===c?' active':'');
    b.textContent=c;b.dataset.cat=c;b.onclick=function(){filterWheel(this,c);};
    row.appendChild(b);
  });
};
function filterWheel(el,cat){
  haptic('light');wheelFilter=cat;
  document.querySelectorAll('#wheel-filters .pill').forEach(b=>b.classList.toggle('active',b.dataset.cat===cat));
  document.getElementById('result-area').innerHTML='';drawWheel();
}
function getWheelIdeas(){
  const base=window._ideas.filter(i=>!i.done);
  return wheelFilter==='all'?base:base.filter(i=>i.cat===wheelFilter);
}
window.drawWheel=function(highlight=-1){
  const cv=document.getElementById('wheel');if(!cv)return;
  const ctx=cv.getContext('2d'),cx=300,cy=300,r=288;
  ctx.clearRect(0,0,600,600);
  const list=getWheelIdeas();
  if(!list.length){
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fillStyle='#F5EEED';ctx.fill();
    ctx.fillStyle='#9E9890';ctx.textAlign='center';
    ctx.font='bold 22px Plus Jakarta Sans';ctx.fillText('Aucune idée !',cx,cy-8);
    ctx.font='18px Plus Jakarta Sans';ctx.fillText("Ajoutez-en d'abord 💝",cx,cy+24);return;
  }
  const slice=(Math.PI*2)/list.length;
  list.forEach((idea,i)=>{
    const start=wheelRot+i*slice,end=start+slice;
    const base=CAT_COLORS[idea.cat]||'#888';
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,start,end);ctx.closePath();
    ctx.fillStyle=highlight===i?lighten(base):base;ctx.fill();
    ctx.strokeStyle='white';ctx.lineWidth=3;ctx.stroke();
    ctx.save();ctx.translate(cx,cy);ctx.rotate(start+slice/2);
    ctx.textAlign='right';ctx.fillStyle='rgba(255,255,255,0.95)';
    ctx.shadowColor='rgba(0,0,0,.3)';ctx.shadowBlur=5;
    const fs=list.length>10?15:list.length>6?18:21;
    ctx.font=`600 ${fs}px Plus Jakarta Sans`;
    const label=idea.name.length>15?idea.name.slice(0,14)+'…':idea.name;
    ctx.fillText(label,r-16,fs/3);ctx.restore();
  });
  ctx.beginPath();ctx.arc(cx,cy,54,0,Math.PI*2);ctx.fillStyle='white';ctx.fill();
};
function lighten(hex){
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgb(${Math.min(255,r+65)},${Math.min(255,g+65)},${Math.min(255,b+65)})`;
}
function spinWheel(){
  const list=getWheelIdeas();if(!list.length||spinning)return;
  haptic('heavy');spinning=true;document.getElementById('spin-btn').disabled=true;
  document.getElementById('result-area').innerHTML='';
  const idx=Math.floor(Math.random()*list.length);
  const slice=(Math.PI*2)/list.length;
  const target=-(idx*slice+slice/2)+(Math.PI*1.5);
  const extra=(7+Math.random()*5)*Math.PI*2;
  const delta=((target-wheelRot)%(Math.PI*2)+Math.PI*2)%(Math.PI*2);
  const total=extra+delta,dur=4500,t0=performance.now(),r0=wheelRot;
  function frame(now){
    const t=Math.min((now-t0)/dur,1),ease=1-Math.pow(1-t,4);
    wheelRot=r0+total*ease;window.drawWheel();
    if(t<1){requestAnimationFrame(frame);return;}
    wheelRot=r0+total;spinning=false;
    document.getElementById('spin-btn').disabled=false;
    window.drawWheel(idx);haptic('success');
    const wEl=document.getElementById('wheel');const wr=wEl.getBoundingClientRect();
    spawnHearts(wr.left+wr.width/2,wr.top+wr.height/2,16);
    const winner=list[idx],bs=BUDGET_STYLE[winner.budget]||BUDGET_STYLE['€€'];
    const hasAddr=looksLikeAddress(winner.note)||/https?:\/\/maps/i.test(winner.note||'');
    document.getElementById('result-area').innerHTML=`
      <div class="result-box">
        <div class="result-label">C'est décidé… ✨</div>
        <div class="result-name">${esc(winner.name)}</div>
        ${winner.note?`<div class="result-detail" style="margin-top:5px;font-style:italic">${esc(winner.note)}</div>`:''}
        <div class="result-detail" style="margin-top:6px">${winner.cat} · <span style="background:${bs.bg};color:${bs.color};padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600">${winner.budget}</span></div>
        <div class="result-actions">
          <button class="btn-done" onclick="markDoneFromWheel('${winner.fbKey}','${esc(winner.name).replace(/'/g,"\\'")}','${winner.cat}')">✓ On y va !</button>
          <button class="btn-result-share" onclick="shareIdea('${esc(winner.name).replace(/'/g,"\\'")}','${(winner.note||'').replace(/'/g,"\\'")}')">
            <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
            Partager
          </button>
          ${hasAddr?`<button class="btn-result-share" onclick="openMaps('${(winner.note||'').replace(/'/g,"\\'")}')">🚗</button>`:''}
        </div>
      </div>`;
  }
  requestAnimationFrame(frame);
}
async function markDoneFromWheel(fbKey,name,cat){
  haptic('medium');
  if(window._fb)await window._fb.update(window._fb.ideaRef(fbKey),{done:true});
  document.getElementById('m-name').value=name;
  document.getElementById('m-cat').value=cat;

}

/* Check if URL is a direct image */
function isImageUrl(url){
  if(!url)return false;
  try{
    const u=new URL(url);
    return /\.(jpg|jpeg|png|gif|webp|avif)(\?.*)?$/i.test(u.pathname)||
      /lh\d\.googleusercontent\.com|photos\.google\.com|drive\.google\.com\/thumbnail|pbs\.twimg|instagram\.com\/p\//i.test(u.hostname+u.pathname);
  }catch(_){return false;}
}
function buildPhotoHtml(url){
  if(!url)return '';
  if(isImageUrl(url)) return `<img class="memory-photo" src="${esc(url)}" alt="photo" loading="lazy" onerror="this.style.display='none'"/>`;
  return `<a href="${esc(url)}" target="_blank" rel="noopener" style="display:block;padding:8px 13px 0;font-size:12px;color:var(--blue);font-weight:500;text-decoration:none">📸 Voir la photo →</a>`;
}

window.renderMemories=function(){
  const all=window._memories;
  const list=memFilter==='all'?all:all.filter(m=>m.cat===memFilter);
  const el=document.getElementById('memories-list');if(!el)return;
  const bm=document.getElementById('badge-mem');if(bm)bm.textContent=all.length;
  if(!all.length){el.innerHTML=`<div class="empty"><div class="empty-icon">📖</div><p>Vos souvenirs apparaîtront ici.<br>Notez une sortie pour commencer !</p></div>`;return;}
  if(!list.length){el.innerHTML=`<div class="empty"><div class="empty-icon">🔍</div><p>Aucun souvenir dans cette catégorie.</p></div>`;return;}
  const sorted=[...list].sort((a,b)=>{
    const na=a.name||'',nb=b.name||'';
    return memSortOrder==='asc'?na.localeCompare(nb,'fr'):nb.localeCompare(na,'fr');
  });
  let currentLetter=null;
  let html='<div class="timeline">';
  sorted.forEach(m=>{
    const letter=(m.name||'?')[0].toUpperCase();
    if(letter!==currentLetter){currentLetter=letter;html+=`<div class="timeline-year">${letter}</div>`;}
    const stars='⭐'.repeat(m.rating||0);
    const dateStr=m.date?new Date(m.date+'T12:00:00').toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'}):'';
    html+=`<div class="timeline-item">
      <div class="memory-card">
        ${buildPhotoHtml(m.photoUrl)}
        <div class="memory-body">
          <div class="memory-head">
            <div style="flex:1;min-width:0">
              <div class="memory-name">${esc(m.name)}</div>
              ${dateStr?`<div class="memory-date">📅 ${dateStr}</div>`:''}
            </div>
            <button class="btn-icon danger" onclick="deleteMemory(event,'${m.fbKey}')">
              <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
            </button>
          </div>
          <div class="memory-tags">
            <span class="tag" style="background:${CAT_COLORS[m.cat]||'#888'}22;color:${CAT_COLORS[m.cat]||'#888'};border-color:${CAT_COLORS[m.cat]||'#888'}44">${m.cat}</span>
            <span class="stars">${stars}</span>
          </div>
          ${m.note?`<div class="memory-note">${esc(m.note)}</div>`:''}
        </div>
      </div>
    </div>`;
  });
  html+='</div>';el.innerHTML=html;
};

window.renderStats=function(){
  const el=document.getElementById('stats-area'),all=window._memories;if(!el)return;
  if(!all.length){el.innerHTML='';return;}
  const avg=(all.reduce((a,m)=>a+(m.rating||0),0)/all.length).toFixed(1);
  const cats={};all.forEach(m=>{cats[m.cat]=(cats[m.cat]||0)+1;});
  const favCat=Object.entries(cats).sort((a,b)=>b[1]-a[1])[0]?.[0]||'—';
  el.innerHTML=`
    <div class="stat-card"><div class="stat-num">${all.length}</div><div class="stat-label">sorties vécues</div></div>
    <div class="stat-card"><div class="stat-num">${avg}⭐</div><div class="stat-label">note moyenne</div></div>
    <div class="stat-card"><div class="stat-num" style="font-size:17px">${favCat}</div><div class="stat-label">catégorie fav'</div></div>
    <div class="stat-card"><div class="stat-num" style="font-size:20px">💝</div><div class="stat-label">avec amour</div></div>`;
};

  const name=document.getElementById('m-name').value.trim();

/* ══════════════════════════════════════════
   EXPORT
══════════════════════════════════════════ */
function exportHistory(){
  haptic('light');
  const mems=window._memories;
  if(!mems.length){toast('Aucun souvenir à exporter !');return;}
  const sorted=[...mems].sort((a,b)=>(a.name||'').localeCompare(b.name||'','fr'));
  let txt=`💝 Notre histoire ensemble 💝\n${'═'.repeat(36)}\n\n`;
  txt+=`${mems.length} sortie(s) vécue(s)\n`;
  const avg=(mems.reduce((a,m)=>a+(m.rating||0),0)/mems.length).toFixed(1);
  txt+=`Note moyenne : ${avg} ⭐\n\n${'─'.repeat(36)}\n\n`;
  sorted.forEach(m=>{
    txt+=`▸ ${m.name}\n`;
    if(m.date)txt+=`  📅 ${new Date(m.date+'T12:00:00').toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'})}\n`;
    txt+=`  🏷 ${m.cat} · ${'⭐'.repeat(m.rating||0)}\n`;
    if(m.note)txt+=`  💬 "${m.note}"\n`;
    txt+='\n';
  });
  txt+=`\n${'═'.repeat(36)}\nGénéré le ${new Date().toLocaleDateString('fr-FR')} 💝`;
  const blob=new Blob([txt],{type:'text/plain;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;
  a.download='notre-histoire-'+new Date().toISOString().slice(0,10)+'.txt';
  a.click();URL.revokeObjectURL(url);
  toast('Notre histoire téléchargée 💝');
}

/* ══════════════════════════════════════════
   UTILS
══════════════════════════════════════════ */
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
let toastTimer;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),2800);
}
